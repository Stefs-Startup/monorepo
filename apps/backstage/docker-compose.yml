services:
  postgres:
    image: postgres:18-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: America/New_York
      PGTZ: America/New_York
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backstage:
    # Requires backstage app to be built locally first (yarn build:backend)
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    ports:
      - 7007:7007
    env_file:
      - .env

volumes:
  postgres-data:
