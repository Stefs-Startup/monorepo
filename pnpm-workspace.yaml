# pnpm-workspace.yaml
#
# AGENT CONTEXT: This file defines the pnpm monorepo workspace.
# pnpm uses this to link packages together locally — when one workspace
# package depends on another (e.g. packages/ui), pnpm symlinks it instead
# of fetching from the registry. This means local changes are always live.
#
# HOW IT WORKS:
#   - Any directory matching a pattern below that contains a package.json
#     is treated as a workspace package.
#   - `pnpm install` from the root installs all deps for all packages.
#   - `pnpm --filter <name> <cmd>` runs a command in a specific package.
#   - `pnpm -r <cmd>` runs a command recursively across all packages.
#
# ADDING A NEW APP OR PACKAGE:
#   1. Create a directory under apps/ or packages/
#   2. Add a package.json with a unique "name" field
#   3. Run `pnpm install` from the repo root — no other config needed
#
# GLOB PATTERNS:
#   - 'apps/*'     → each immediate subdirectory of apps/ is a workspace
#   - 'packages/*' → each immediate subdirectory of packages/ is a workspace
#   - Add new top-level globs here if new workspace categories are introduced
#     (e.g. 'tools/*' for internal CLI tooling, 'services/*' for backends)
#
# DOCS: https://pnpm.io/workspaces

packages:
  # Deployable units: web apps, APIs, CLIs, mobile apps.
  # Each app should be independently deployable.
  - 'apps/*'
  - '!apps/backstage'

  # Shared libraries consumed by apps and other packages.
  # Examples: ui components, utility functions, shared types, config presets.
  # Packages should never depend on apps — dependency flow is one-directional.
  - 'packages/*'
